aid: the-administration-for-children-and-families
name: The Administration for Children and Families
description: >-
  The Administration for Children and Families (ACF) is a division of the
  U.S. Department of Health and Human Services dedicated to promoting the
  economic and social well-being of children, families, and communities.
  ACF administers programs including TANF (cash assistance), CCDF (child
  care), Head Start, LIHEAP (energy assistance), child welfare, and
  refugee assistance. ACF collects administrative data via systems including
  AFCARS (foster care and adoption), NCANDS (child abuse and neglect),
  NYTD (youth in transition), TANF data reporting, and CCDF data. ACF is
  pursuing interoperability standards using HL7 FHIR and USCDI+ for
  human services data exchange. The TANF Data Portal (tanfdata.acf.hhs.gov)
  provides state agencies with a data submission and analysis interface.
type: Index
